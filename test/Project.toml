# AD stack (Enzyme/ForwardDiff/FiniteDifferences) is a TEST/train-time dependency only — the F_diff
# runtime (src/) is deliberately dependency-free (ADR 0014). The gradient-correctness gate
# (test/testitems/gradient_correctness_tests.jl) uses Enzyme reverse-mode + ForwardDiff vs
# FiniteDifferences ground truth through the daily rollout.
[compat]
# PINNED to ≤ 0.13.188: Enzyme 0.13.189 regressed the Enzyme-reverse canopy path on Julia 1.10 with
# `LLVM error: Canonicalization failed` (nn_canopy_training_tests.jl:22/:145). 0.13.188 is last-good
# (CI green on a6d6975). Kept in sync with the root Project.toml cap. Lift when a fixed Enzyme ships.
Enzyme = "0.13.0 - 0.13.188"
FiniteDifferences = "0.12"
ForwardDiff = "1"
Lux = "1"
Optimisers = "0.4"
Zygote = "0.6, 0.7"
julia = "1.10"
