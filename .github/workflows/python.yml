# Python prototype checks (ENGINEERING_STANDARDS.md §3): lint, format, tests.
# The prototype is uv-managed and lives under python/.
name: python

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    name: python
    runs-on: ubuntu-latest
    # All `run` steps execute inside python/ where pyproject.toml / uv.lock live.
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          working-directory: python
      - name: Sync environment (frozen to uv.lock)
        # --frozen installs exactly the committed uv.lock (no re-resolve), so CI is
        # reproducible and a floating major can't sneak in (root cause of the prior failure).
        run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Pytest
        run: uv run pytest
