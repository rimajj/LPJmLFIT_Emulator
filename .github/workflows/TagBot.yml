# TagBot creates GitHub releases + tags from Julia registry merges and generates
# changelog release notes (ENGINEERING_STANDARDS.md §1, §3). Standard template.
name: TagBot

on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      lookback:
        default: '3'

permissions:
  actions: read
  checks: read
  contents: write
  deployments: read
  issues: read
  discussions: read
  packages: read
  pull-requests: read
  statuses: read

jobs:
  TagBot:
    # Only react to the registrator/JuliaTagBot comment or a manual dispatch.
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Lets TagBot trigger a versioned docs deploy for the new tag.
          ssh: ${{ secrets.DOCUMENTER_KEY }}
