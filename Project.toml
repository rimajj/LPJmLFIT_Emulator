name = "LPJmLFITEmulator"
uuid = "e4cfba23-4562-4fe9-8259-be4d4b246161"
authors = ["Jamir Priesner"]
version = "0.1.0"

# ─────────────────────────────────────────────────────────────────────────────
# ESM-ready LPJmL-FIT hybrid land component.
#   S = slow ML trait/size distribution emulator (annual)
#   F = fast physical biophysical core kept from LPJmL-FIT (daily)
#   E = surface-energy-balance + skin-temperature closure (new; reuse Terrarium.jl)
# See DESIGN.md (frozen schemas) and DEVELOPMENT_PLAN.md (phased plan).
#
# Deps are added PER PHASE (keep the graph lean; Aqua checks for stale deps):
#   F_diff (ADR 0014):  the differentiable fast core (src/fdiff.jl, src/allometry.jl,
#     src/fdiff_smoothops.jl) is deliberately RUNTIME-DEPENDENCY-FREE — pure Base Julia. AD is a
#     TRAIN/TEST-time tool (ADR 0014), so Enzyme + ForwardDiff + FiniteDifferences live in
#     test/Project.toml (the gradient-correctness gate), NOT here. The λ solve uses a
#     fixed-graph damped Newton with a finite-difference g', so no runtime AD dep is needed.
#   Scale-up deps (added WHEN the feature lands, to stay Aqua-clean):
#     • learned closures in F/E:  Lux, KernelAbstractions (GPU)
#     • production λ adjoint:     SciMLSensitivity (SteadyStateAdjoint) + NonlinearSolve/OrdinaryDiffEq
#     • energy layer E (Phase 4): Terrarium (SurfaceEnergyBalance/ImplicitSkinTemperature)
#     • cross-cutting:            StableRNGs, DrWatson (reproducibility)
# ─────────────────────────────────────────────────────────────────────────────

[deps]

# The hybrid NN-hook training capability (gradient-based online-rollout training of the learned
# Vcmax / λ corrections; ADR 0016, scale-up step 7b) ships as a PACKAGE EXTENSION so the F_diff
# runtime stays dependency-free: Lux/Zygote/Optimisers are loaded ONLY when the user opts in with
# `using Lux, Zygote, Optimisers` (which activates `ext/FDiffTrainingExt.jl`). They are NOT runtime
# deps — the physics core (src/fdiff.jl) only ever *calls* the learned hook (a plain function).
[weakdeps]
Lux = "b2108857-7c20-44ae-9111-449ecde12c47"
Optimisers = "3bd65402-5787-11e9-1adc-39752487f4e2"
Zygote = "e88e6eb3-aa80-5325-afca-941959d7151f"

[extensions]
FDiffTrainingExt = ["Lux", "Zygote", "Optimisers"]

[compat]
Lux = "1"
Optimisers = "0.4"
Zygote = "0.6, 0.7"
julia = "1.10"

# Test dependencies live in `test/Project.toml` (the test-specific environment used by
# `Pkg.test()` / ReTestItems). Do NOT add an [extras]/[targets] stanza here — the two
# mechanisms are mutually exclusive.
